name: Test

on:
  workflow_call:
    secrets:
      auth-token:
        description: "v1 api key used for integration tests"
        required: true
      github-token:
        description: "Token for running Github actions"
        required: true
      api-key-v2:
        description: "v2 api key used for integration tests"
        required: true

jobs:
  test: 
    env:
        V1_API_KEY: ${{ secrets.auth-token }}
        MOMENTO_API_KEY: ${{ secrets.api-key-v2 }}
        MOMENTO_ENDPOINT: "cell-alpha-dev.preprod.a.momentohq.com"

    runs-on: macos-latest
    steps:
      - uses: swift-actions/setup-swift@v2
        with:
          swift-version: 6.1.0

      - name: Setup repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.github-token }}

      - name: Build momento package
        run: swift build

      - name: Run momento package tests
        run: swift test

      - name: Build topics example
        run: cd Examples/topics && swift run

      - name: Build cache example
        run: cd Examples/cache && swift run

      - name: Build quickstart example
        run: cd Examples/quickstart && swift run
      
      - name: Run dev doc examples
        run: cd Examples/doc-example-apis && swift run

